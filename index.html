<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Beginning</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      width: 100%;
      height: 100vh;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .container {
      text-align: center;
    }

    .start-btn {
      background: #b04a78;
      color: white;
      border: none;
      padding: 14px 30px;
      font-size: 1rem;
      border-radius: 14px;
      cursor: pointer;
      letter-spacing: 1px;
      box-shadow: 0 0 20px rgba(176, 74, 120, 0.25);
      transition: transform 0.25s ease, background 0.25s ease, box-shadow 0.25s ease;
      animation: fadeIn 1.4s ease;
    }

    .start-btn:hover {
      background: #9a3f69;
      transform: scale(1.05);
      box-shadow: 0 0 28px rgba(176, 74, 120, 0.4);
    }

    .start-btn:active {
      transform: scale(0.98);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(15px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <button class="start-btn" onclick="enterSite()">the beginning</button>
  </div>

  <script>
    function enterSite() {
      window.location.href = "hub.html";
    }
  </script>
</body>
</html>
